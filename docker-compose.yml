version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: smartfeed-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  backend:
    build:
      context: ./backend
    container_name: smartfeed-backend
    env_file:
      - .env.example
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./generated:/app/generated

  frontend:
    image: node:20-alpine
    container_name: smartfeed-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  mongo_data:
